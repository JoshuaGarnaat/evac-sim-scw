<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evacuation replay</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene" aria-label="Evacuation replay"></canvas>

  <header class="top-bar">
    <div class="brand">
      <span class="brand__eyebrow">Simulation viewer</span>
      <strong>Evacuation replay</strong>
    </div>

    <section class="metrics" aria-label="Replay metrics">
      <div class="metric">
        <strong id="timer">00:00.0</strong>
        <span>Simulation time</span>
      </div>
      <div class="metric">
        <strong id="evacuated">0</strong>
        <span>Evacuated</span>
      </div>
      <div class="metric">
        <strong id="remaining">0</strong>
        <span>Remaining</span>
      </div>
      <div class="metric metric--secondary">
        <strong id="fps">--</strong>
        <span>Render FPS</span>
      </div>
    </section>
  </header>

  <div class="evacuation-progress" aria-hidden="true">
    <span id="progress"></span>
  </div>

  <section class="control-panel" aria-label="Replay controls">
    <div class="control-panel__row">
      <button id="play" class="button button--primary" type="button">Pause</button>

      <label class="field">
        <span>Playback speed</span>
        <select id="speed">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
      </label>

      <label class="field">
        <span>Visible floor</span>
        <select id="floor">
          <option value="all">All floors</option>
          <option value="0">Ground floor</option>
          <option value="1">First floor</option>
          <option value="2">Second floor</option>
        </select>
      </label>

      <button id="overview" class="button" type="button">Reset view</button>
    </div>

    <label class="timeline-field">
      <span class="visually-hidden">Replay position</span>
      <input id="timeline" type="range" min="0" max="1000" value="0">
    </label>
  </section>

  <aside class="help-text">
    Click the view for mouse look · WASD to move · Space/Ctrl for height · Shift to move faster · Esc to release
  </aside>

  <div id="loading" class="loading" role="status">Loading replay…</div>
  <script type="module" src="app.js"></script>
</body>
</html>
